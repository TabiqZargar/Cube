<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>CubeTimer</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='2' width='8' height='8' rx='1.5' fill='%23fff' stroke='%23222' stroke-width='.6'/%3E%3Crect x='12' y='2' width='8' height='8' rx='1.5' fill='%23fff' stroke='%23222' stroke-width='.6'/%3E%3Crect x='22' y='2' width='8' height='8' rx='1.5' fill='%23fff' stroke='%23222' stroke-width='.6'/%3E%3Crect x='2' y='12' width='8' height='8' rx='1.5' fill='%23FF5800' stroke='%23222' stroke-width='.6'/%3E%3Crect x='12' y='12' width='8' height='8' rx='1.5' fill='%23009E60' stroke='%23222' stroke-width='.6'/%3E%3Crect x='22' y='12' width='8' height='8' rx='1.5' fill='%23B71234' stroke='%23222' stroke-width='.6'/%3E%3Crect x='2' y='22' width='8' height='8' rx='1.5' fill='%23FFD500' stroke='%23222' stroke-width='.6'/%3E%3Crect x='12' y='22' width='8' height='8' rx='1.5' fill='%230051BA' stroke='%23222' stroke-width='.6'/%3E%3Crect x='22' y='22' width='8' height='8' rx='1.5' fill='%23FFD500' stroke='%23222' stroke-width='.6'/%3E%3C/svg%3E"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Inter",
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: #08080e;
        color: #eee;
        overflow: hidden;
        height: 100vh;
        height: 100dvh;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      #bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 90% 70% at 50% 30%,
            rgba(80, 80, 80, 0.1) 0%,
            transparent 100%
          ),
          radial-gradient(
            ellipse 50% 40% at 15% 75%,
            rgba(60, 60, 60, 0.06) 0%,
            transparent 100%
          ),
          radial-gradient(
            ellipse 50% 40% at 85% 70%,
            rgba(70, 70, 70, 0.08) 0%,
            transparent 100%
          );
      }
      #bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at 30% 40%,
            rgba(100, 100, 100, 0.03) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 70% 60%,
            rgba(80, 80, 80, 0.02) 0%,
            transparent 50%
          );
        animation: bgDrift 25s ease-in-out infinite alternate;
      }
      #bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 60% 30%,
          rgba(90, 90, 90, 0.02) 0%,
          transparent 40%
        );
        animation: bgDrift2 30s ease-in-out infinite alternate;
      }
      @keyframes bgDrift {
        0% {
          transform: translate(0, 0) scale(1);
          opacity: 0.5;
        }
        50% {
          transform: translate(3%, -1%) scale(1.1);
          opacity: 1;
        }
        100% {
          transform: translate(-2%, 1%) scale(0.9);
          opacity: 0.6;
        }
      }
      @keyframes bgDrift2 {
        0% {
          transform: translate(0, 0) scale(1);
          opacity: 0.4;
        }
        50% {
          transform: translate(-2%, 2%) scale(1.05);
          opacity: 0.8;
        }
        100% {
          transform: translate(1%, -2%) scale(0.95);
          opacity: 0.5;
        }
      }
      #app {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100dvh;
        padding: 18px 16px 14px;
      }
      #top {
        width: 100%;
        max-width: 800px;
        text-align: center;
        flex-shrink: 0;
      }
      #scramble {
        font-family: "JetBrains Mono", "Consolas", "Courier New", monospace;
        font-size: clamp(13px, 1.6vw, 19px);
        color: #ccc;
        text-align: center;
        line-height: 1.6;
        min-height: 2.4em;
        padding: 7px 16px;
        background: linear-gradient(
          135deg,
          rgba(26, 27, 38, 0.7),
          rgba(30, 28, 40, 0.7)
        );
        border-radius: 10px;
        display: inline-block;
        max-width: 100%;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.04);
        margin-bottom: 2px;
        position: relative;
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.02);
        animation: fadeSlide 0.4s ease;
      }
      #scramble::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 11px;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(200, 200, 200, 0.08),
          transparent 40%,
          transparent 60%,
          rgba(200, 200, 200, 0.04)
        );
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      #timer-wrap {
        position: relative;
        display: inline-block;
        margin: 2px 0;
      }
      #timer-wrap::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 130%;
        height: 150%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        pointer-events: none;
        transition: opacity 0.4s;
        opacity: 0;
        background: radial-gradient(
          ellipse at center,
          rgba(200, 200, 200, 0.06) 0%,
          transparent 70%
        );
      }
      #timer-wrap.ready::after {
        opacity: 1;
        background: radial-gradient(
          ellipse at center,
          rgba(200, 200, 200, 0.1) 0%,
          transparent 70%
        );
      }
      #timer-wrap.running::after {
        opacity: 1;
        background: radial-gradient(
          ellipse at center,
          rgba(220, 220, 220, 0.08) 0%,
          transparent 70%
        );
      }
      #timer-wrap.stopped::after {
        opacity: 1;
        background: radial-gradient(
          ellipse at center,
          rgba(180, 180, 180, 0.1) 0%,
          transparent 70%
        );
      }
      #timer {
        font-family: "JetBrains Mono", "Consolas", "Courier New", monospace;
        font-size: clamp(52px, 14vw, 130px);
        font-weight: 250;
        letter-spacing: 0.04em;
        color: #ddd;
        font-variant-numeric: tabular-nums;
        line-height: 1.05;
        transition:
          color 0.2s,
          text-shadow 0.2s;
        position: relative;
      }
      #timer.ready {
        color: #ccc;
        text-shadow:
          0 0 40px rgba(200, 200, 200, 0.12),
          0 0 80px rgba(200, 200, 200, 0.05);
      }
      #timer.running {
        color: #f0f0f0;
        text-shadow:
          0 0 60px rgba(220, 220, 220, 0.08),
          0 0 120px rgba(220, 220, 220, 0.03);
      }
      #timer.stopped {
        color: #aaa;
        text-shadow:
          0 0 40px rgba(180, 180, 180, 0.12),
          0 0 80px rgba(180, 180, 180, 0.05);
      }
      #info {
        font-size: clamp(11px, 0.9vw, 13px);
        color: #3b3d52;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 500;
        transition: color 0.25s;
        margin-top: 2px;
        min-height: 1.2em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #info.active {
        color: transparent;
        background: linear-gradient(90deg, #777, #aaa, #777);
        background-clip: text;
        -webkit-background-clip: text;
        background-size: 200% 100%;
        animation: shimmer 3s ease-in-out infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      @keyframes pop {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes pulse-glow {
        0%,
        100% {
          opacity: 0.06;
        }
        50% {
          opacity: 0.15;
        }
      }
      @keyframes fadeSlide {
        0% {
          opacity: 0;
          transform: translateY(4px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #canvas-container {
        flex: 1 1 auto;
        width: 100%;
        max-width: min(520px, 85vw);
        max-height: min(520px, 55vh);
        min-height: 0;
        position: relative;
        cursor: grab;
        margin: 4px 0;
        border-radius: 50%;
        touch-action: none;
        background: radial-gradient(
          circle at center,
          rgba(100, 100, 100, 0.04) 0%,
          transparent 70%
        );
      }
      #canvas-container::before {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: 50%;
        pointer-events: none;
        background: conic-gradient(
          from 0deg at 50% 50%,
          rgba(200, 200, 200, 0.03),
          rgba(150, 150, 150, 0.02),
          rgba(100, 100, 100, 0.02),
          rgba(200, 200, 200, 0.03)
        );
        animation: ringRotate 8s linear infinite;
        mask: radial-gradient(
          circle at center,
          transparent 48%,
          #000 48.5%,
          #000 51%,
          transparent 51.5%
        );
        -webkit-mask: radial-gradient(
          circle at center,
          transparent 48%,
          #000 48.5%,
          #000 51%,
          transparent 51.5%
        );
      }
      #canvas-container::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        pointer-events: none;
        background: radial-gradient(
          circle at center,
          transparent 25%,
          rgba(10, 10, 20, 0.7) 100%
        );
      }
      #canvas-container:active {
        cursor: grabbing;
      }
      @keyframes ringRotate {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      #canvas-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
      #bottom {
        width: 100%;
        max-width: 700px;
        flex-shrink: 0;
        padding-top: 6px;
      }
      #stats {
        display: flex;
        gap: 2px;
        justify-content: center;
        background: linear-gradient(
          135deg,
          rgba(18, 18, 30, 0.7),
          rgba(22, 20, 36, 0.7)
        );
        border-radius: 12px;
        padding: 8px 4px;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.04);
        position: relative;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      #stats::-webkit-scrollbar {
        display: none;
      }
      #stats::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 13px;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(200, 200, 200, 0.05),
          transparent 40%,
          transparent 60%,
          rgba(200, 200, 200, 0.03)
        );
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      #stats .stat {
        flex: 1;
        min-width: 0;
        text-align: center;
        padding: 6px 2px;
        border-radius: 8px;
        transition: all 0.2s;
      }
      #stats .stat:hover {
        background: rgba(255, 255, 255, 0.03);
      }
      #stats .stat .label {
        color: #4a4d6a;
        font-size: clamp(9px, 0.7vw, 11px);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-weight: 600;
        margin-bottom: 2px;
      }
      #stats .stat .value {
        color: #a0a8b8;
        font-weight: 600;
        font-family: "JetBrains Mono", "Consolas", monospace;
        font-size: clamp(13px, 1vw, 16px);
        font-variant-numeric: tabular-nums;
      }
      #stats .stat .value.best {
        color: #9ece6a;
        text-shadow: 0 0 12px rgba(158, 206, 106, 0.15);
      }
      #stats .stat .value.worst {
        color: #f7768e;
        text-shadow: 0 0 12px rgba(247, 118, 142, 0.15);
      }
      #times {
        display: flex;
        gap: 4px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px 4px 4px;
        scrollbar-width: none;
        -ms-overflow-style: none;
        justify-content: center;
        flex-wrap: wrap;
        min-height: 26px;
        max-height: 56px;
        align-content: flex-start;
        -webkit-overflow-scrolling: touch;
        mask-image: linear-gradient(
          to right,
          transparent 0%,
          #000 4px,
          #000 calc(100% - 4px),
          transparent 100%
        );
        -webkit-mask-image: linear-gradient(
          to right,
          transparent 0%,
          #000 4px,
          #000 calc(100% - 4px),
          transparent 100%
        );
      }
      #times.wrap {
        flex-wrap: wrap;
      }
      #times::-webkit-scrollbar {
        display: none;
      }
      .time-tag {
        font-family: "JetBrains Mono", "Consolas", monospace;
        font-size: clamp(11px, 0.75vw, 12px);
        color: #4a4d6a;
        padding: 2px 8px;
        border-radius: 6px;
        background: rgba(26, 27, 38, 0.5);
        white-space: nowrap;
        border: 1px solid rgba(255, 255, 255, 0.03);
        font-variant-numeric: tabular-nums;
        transition: background 0.15s;
      }
      .time-tag:hover {
        background: rgba(26, 27, 38, 0.9);
      }
      .time-tag.best {
        color: #9ece6a;
        background: rgba(158, 206, 106, 0.1);
        border-color: rgba(158, 206, 106, 0.15);
      }
      .time-tag.worst {
        color: #f7768e;
        background: rgba(247, 118, 142, 0.1);
        border-color: rgba(247, 118, 142, 0.15);
      }
      #hint {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        letter-spacing: 0.06em;
        pointer-events: none;
        font-weight: 500;
        z-index: 1;
        color: transparent;
        background: linear-gradient(90deg, #242540, #353a60, #242540);
        background-clip: text;
        -webkit-background-clip: text;
      }
      #scramble-btn {
        position: fixed;
        top: 18px;
        right: 18px;
        background: linear-gradient(
          135deg,
          rgba(26, 27, 38, 0.8),
          rgba(30, 28, 40, 0.8)
        );
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: #ccc;
        padding: 7px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
        font-family: inherit;
        font-weight: 500;
        transition: all 0.25s;
        z-index: 10;
        letter-spacing: 0.02em;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        touch-action: manipulation;
      }
      #scramble-btn:hover {
        background: linear-gradient(
          135deg,
          rgba(35, 38, 55, 0.9),
          rgba(40, 38, 52, 0.9)
        );
        border-color: rgba(200, 200, 200, 0.25);
        box-shadow: 0 2px 20px rgba(200, 200, 200, 0.06);
        color: #eee;
      }
      #scramble-btn:active {
        transform: scale(0.97);
      }
      @media (max-width: 700px) {
        #app {
          padding: 14px 12px 10px;
        }
        #top {
          max-width: 100%;
        }
        #canvas-container {
          max-width: min(420px, 75vw);
          max-height: min(420px, 75vw);
        }
        #stats .stat .value {
          font-size: clamp(12px, 2vw, 14px);
        }
        .time-tag {
          font-size: clamp(10px, 1.6vw, 12px);
        }
      }
      @media (max-width: 480px) {
        #app {
          padding: 10px 8px 8px;
        }
        #scramble {
          font-size: clamp(10px, 2.8vw, 12px);
          padding: 4px 10px;
          min-height: 2em;
          line-height: 1.5;
        }
        #timer {
          font-size: clamp(44px, 16vw, 60px);
        }
        #canvas-container {
          max-width: min(340px, 80vw);
          max-height: min(340px, 80vw);
          margin: 2px 0;
        }
        #canvas-container::before {
          mask: radial-gradient(
            circle at center,
            transparent 46%,
            #000 46.5%,
            #000 52%,
            transparent 52.5%
          );
          -webkit-mask: radial-gradient(
            circle at center,
            transparent 46%,
            #000 46.5%,
            #000 52%,
            transparent 52.5%
          );
        }
        #bottom {
          padding-top: 2px;
        }
        #stats {
          border-radius: 10px;
          gap: 0;
          padding: 5px 2px;
        }
        #stats .stat .label {
          font-size: 8px;
          letter-spacing: 0.1em;
        }
        #stats .stat .value {
          font-size: 11px;
        }
        #times {
          gap: 3px;
          padding: 4px 2px 2px;
          max-height: 40px;
          min-height: 20px;
        }
        .time-tag {
          font-size: 9px;
          padding: 1px 5px;
          border-radius: 4px;
        }
        #scramble-btn {
          top: 8px;
          right: 8px;
          padding: 6px 10px;
          font-size: 10px;
        }
        #hint {
          font-size: 9px;
          bottom: 4px;
        }
      }
      @media (max-width: 380px) {
        #app {
          padding: 6px 4px 4px;
        }
        #scramble {
          font-size: 9px;
          padding: 3px 8px;
          min-height: 1.6em;
        }
        #timer {
          font-size: clamp(36px, 14vw, 44px);
        }
        #canvas-container {
          max-width: min(240px, 82vw);
          max-height: min(240px, 82vw);
        }
        #canvas-container::before {
          mask: radial-gradient(
            circle at center,
            transparent 44%,
            #000 44.5%,
            #000 53%,
            transparent 53.5%
          );
          -webkit-mask: radial-gradient(
            circle at center,
            transparent 44%,
            #000 44.5%,
            #000 53%,
            transparent 53.5%
          );
        }
        #stats {
          padding: 3px 0;
          border-radius: 6px;
        }
        #stats .stat {
          padding: 3px 1px;
        }
        #stats .stat .label {
          font-size: 7px;
        }
        #stats .stat .value {
          font-size: 10px;
        }
        .time-tag {
          font-size: 8px;
          padding: 1px 4px;
        }
        #scramble-btn {
          top: 5px;
          right: 5px;
          padding: 5px 8px;
          font-size: 9px;
        }
        #hint {
          display: none;
        }
      }
      @media (max-height: 600px) and (orientation: landscape) {
        #app {
          flex-direction: row;
          flex-wrap: wrap;
          align-content: center;
          justify-content: center;
          padding: 6px 10px;
          gap: 4px;
        }
        #top {
          flex: 0 0 auto;
          width: auto;
          max-width: 50%;
          padding-right: 8px;
        }
        #scramble {
          font-size: 10px;
          padding: 3px 8px;
          min-height: 1.5em;
        }
        #timer {
          font-size: clamp(28px, 6vh, 40px);
        }
        #canvas-container {
          flex: 0 0 auto;
          width: min(40vh, 240px);
          height: min(40vh, 240px);
          max-width: none;
          max-height: none;
          margin: 0;
        }
        #canvas-container::before {
          display: none;
        }
        #canvas-container::after {
          display: none;
        }
        #bottom {
          flex: 0 0 100%;
          max-width: 100%;
          padding-top: 2px;
        }
        #stats {
          padding: 3px 6px;
        }
        #stats .stat .value {
          font-size: 10px;
        }
        #stats .stat .label {
          font-size: 7px;
        }
        .time-tag {
          font-size: 8px;
          padding: 1px 4px;
        }
        #times {
          max-height: 24px;
          min-height: 0;
          padding: 2px;
        }
        #hint {
          display: none;
        }
        #scramble-btn {
          top: 4px;
          right: 4px;
          padding: 3px 8px;
          font-size: 9px;
        }
      }
    </style>
  </head>
  <body>
    <div id="bg"></div>
    <div id="app">
      <div id="top">
        <div id="scramble"></div>
        <div id="info">Hold spacebar — release to start</div>
        <div id="timer-wrap"><div id="timer">0.00</div></div>
      </div>
      <div id="canvas-container"></div>
      <div id="bottom">
        <div id="stats">
          <div class="stat">
            <div class="label">Ao5</div>
            <div class="value" id="ao5">—</div>
          </div>
          <div class="stat">
            <div class="label">Ao12</div>
            <div class="value" id="ao12">—</div>
          </div>
          <div class="stat">
            <div class="label">Best</div>
            <div class="value best" id="best">—</div>
          </div>
          <div class="stat">
            <div class="label">Worst</div>
            <div class="value worst" id="worst">—</div>
          </div>
          <div class="stat">
            <div class="label">Solves</div>
            <div class="value" id="solves">0</div>
          </div>
        </div>
        <div id="times"></div>
      </div>
    </div>
    <button id="scramble-btn">New Scramble</button>
    <div id="hint">SPACE · hold · release · stop</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      // ─── DOM refs ───
      const scrambleEl = document.getElementById("scramble");
      const timerEl = document.getElementById("timer");
      const timerWrap = document.getElementById("timer-wrap");
      const infoEl = document.getElementById("info");
      const container = document.getElementById("canvas-container");
      const ao5El = document.getElementById("ao5");
      const ao12El = document.getElementById("ao12");
      const bestEl = document.getElementById("best");
      const worstEl = document.getElementById("worst");
      const solvesEl = document.getElementById("solves");
      const timesEl = document.getElementById("times");
      const scrambleBtn = document.getElementById("scramble-btn");

      // ─── State ───
      const state = {
        phase: "idle",
        running: false,
        startTime: 0,
        elapsed: 0,
        animFrame: null,
        scrambling: false,
      };
      const times = [];

      // ─── Three.js setup ───
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        40,
        container.clientWidth / container.clientHeight,
        0.1,
        100,
      );
      camera.position.set(5.5, 4.5, 5.5);
      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;
      container.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.target.set(0, 0, 0);
      controls.minDistance = 4;
      controls.maxDistance = 15;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 2.0;

      const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 1.8);
      directionalLight.position.set(5, 10, 7);
      scene.add(directionalLight);
      const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
      fillLight.position.set(-5, -2, -5);
      scene.add(fillLight);

      // ─── Cube ───
      const STICKER_COLORS = {
        right: "#B71234",
        left: "#FF5800",
        up: "#FFFFFF",
        down: "#FFD500",
        front: "#009E60",
        back: "#0051BA",
      };
      const FACE_ORDER = ["right", "left", "up", "down", "front", "back"];
      const DIR = {
        right: [1, 0, 0],
        left: [-1, 0, 0],
        up: [0, 1, 0],
        down: [0, -1, 0],
        front: [0, 0, 1],
        back: [0, 0, -1],
      };

      const cubeGroup = new THREE.Group();
      scene.add(cubeGroup);

      function stickerCanvas(hexColor) {
        const s = 128,
          inset = s * 0.1;
        const c = document.createElement("canvas");
        c.width = s;
        c.height = s;
        const ctx = c.getContext("2d");
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, s, s);
        ctx.fillStyle = hexColor;
        ctx.fillRect(inset, inset, s - 2 * inset, s - 2 * inset);
        return c;
      }

      function cubieMaterials(x, y, z) {
        const faceColors = [
          x === 1 ? STICKER_COLORS.right : null,
          x === -1 ? STICKER_COLORS.left : null,
          y === 1 ? STICKER_COLORS.up : null,
          y === -1 ? STICKER_COLORS.down : null,
          z === 1 ? STICKER_COLORS.front : null,
          z === -1 ? STICKER_COLORS.back : null,
        ];
        return faceColors.map((c, i) => {
          if (!c)
            return new THREE.MeshStandardMaterial({
              color: 0x111111,
              roughness: 0.7,
            });
          const tex = new THREE.CanvasTexture(stickerCanvas(c));
          tex.anisotropy = 4;
          return new THREE.MeshStandardMaterial({
            map: tex,
            roughness: 0.4,
            metalness: 0.05,
          });
        });
      }

      const cubies = [];
      function buildCube() {
        while (cubeGroup.children.length) {
          const child = cubeGroup.children[0];
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            (Array.isArray(child.material)
              ? child.material
              : [child.material]
            ).forEach((m) => {
              if (m.map) m.map.dispose();
              m.dispose();
            });
          }
          cubeGroup.remove(child);
        }
        cubies.length = 0;
        const geo = new THREE.BoxGeometry(0.92, 0.92, 0.92);
        for (let x = -1; x <= 1; x++) {
          for (let y = -1; y <= 1; y++) {
            for (let z = -1; z <= 1; z++) {
              if (x === 0 && y === 0 && z === 0) continue;
              const mat = cubieMaterials(x, y, z);
              const mesh = new THREE.Mesh(geo, mat);
              mesh.position.set(x, y, z);
              mesh.userData = { home: new THREE.Vector3(x, y, z) };
              cubeGroup.add(mesh);
              cubies.push(mesh);
            }
          }
        }
      }
      buildCube();

      // ─── Face rotation ───
      function getCubiesOnLayer(axis, layer) {
        const eps = 0.3;
        const idx = { x: 0, y: 1, z: 2 }[axis];
        return cubies.filter(
          (c) => Math.abs(c.position.getComponent(idx) - layer) < eps,
        );
      }

      function animateMove(moveStr, duration = 250) {
        return new Promise((resolve) => {
          const match = moveStr.match(/^([UDRLFB])(['2]?)$/);
          if (!match) {
            resolve();
            return;
          }
          const [_, face, mod] = match;
          const axisMap = { U: "y", D: "y", R: "x", L: "x", F: "z", B: "z" };
          const layerMap = { U: 1, D: -1, R: 1, L: -1, F: 1, B: -1 };
          const angleMap = {
            U: -1,
            "U'": 1,
            U2: 2,
            D: 1,
            "D'": -1,
            D2: 2,
            R: -1,
            "R'": 1,
            R2: 2,
            L: 1,
            "L'": -1,
            L2: 2,
            F: -1,
            "F'": 1,
            F2: 2,
            B: 1,
            "B'": -1,
            B2: 2,
          };
          const fullMove = moveStr;
          const angle = angleMap[fullMove];
          if (angle === undefined) {
            resolve();
            return;
          }
          const axis = axisMap[face];
          const layer = layerMap[face];
          const targetCubies = getCubiesOnLayer(axis, layer);
          const pivot = new THREE.Object3D();
          cubeGroup.add(pivot);
          targetCubies.forEach((c) => pivot.attach(c));
          const radians = (angle * Math.PI) / 2;
          const start = performance.now();
          const axVec = {
            x: new THREE.Vector3(1, 0, 0),
            y: new THREE.Vector3(0, 1, 0),
            z: new THREE.Vector3(0, 0, 1),
          }[axis];
          function tick() {
            const t = Math.min((performance.now() - start) / duration, 1);
            const eased = 1 - Math.pow(1 - t, 3);
            pivot.quaternion.setFromAxisAngle(axVec, radians * eased);
            controls.update();
            if (t < 1) {
              requestAnimationFrame(tick);
            } else {
              pivot.quaternion.setFromAxisAngle(axVec, radians);
              pivot.updateMatrixWorld(true);
              targetCubies.forEach((c) => {
                const wp = new THREE.Vector3();
                const wq = new THREE.Quaternion();
                c.getWorldPosition(wp);
                c.getWorldQuaternion(wq);
                cubeGroup.attach(c);
                c.position.set(
                  Math.round(wp.x * 10) / 10,
                  Math.round(wp.y * 10) / 10,
                  Math.round(wp.z * 10) / 10,
                );
                if (Math.abs(c.position.x) < 0.2) c.position.x = 0;
                if (Math.abs(c.position.y) < 0.2) c.position.y = 0;
                if (Math.abs(c.position.z) < 0.2) c.position.z = 0;
                c.quaternion.copy(wq);
                const eps = 0.01;
                c.quaternion.x =
                  Math.abs(c.quaternion.x) < eps
                    ? 0
                    : Math.round(c.quaternion.x * 1000) / 1000;
                c.quaternion.y =
                  Math.abs(c.quaternion.y) < eps
                    ? 0
                    : Math.round(c.quaternion.y * 1000) / 1000;
                c.quaternion.z =
                  Math.abs(c.quaternion.z) < eps
                    ? 0
                    : Math.round(c.quaternion.z * 1000) / 1000;
                c.quaternion.w = Math.round(c.quaternion.w * 1000) / 1000;
              });
              cubeGroup.remove(pivot);
              controls.autoRotate = true;
              resolve();
            }
          }
          controls.autoRotate = false;
          tick();
        });
      }

      // ─── Scramble ───
      function getAxis(f) {
        return { U: 1, D: 1, R: 2, L: 2, F: 3, B: 3 }[f];
      }
      function oppositeFace(f) {
        return { U: "D", D: "U", R: "L", L: "R", F: "B", B: "F" }[f];
      }
      function generateScramble(length = 20) {
        const faces = ["U", "D", "R", "L", "F", "B"];
        const mods = ["", "'", "2"];
        const moves = [];
        let last = "",
          second = "";
        for (let i = 0; i < length; i++) {
          let f;
          let attempts = 0;
          do {
            f = faces[Math.floor(Math.random() * faces.length)];
            attempts++;
          } while (
            (f === last ||
              (getAxis(f) === getAxis(last) &&
                getAxis(last) === getAxis(second))) &&
            attempts < 100
          );
          const m = mods[Math.floor(Math.random() * mods.length)];
          moves.push(f + m);
          second = last;
          last = f;
        }
        return moves;
      }

      let currentScramble = [];

      async function applyScramble(moves) {
        controls.autoRotate = false;
        for (const m of moves) {
          await animateMove(m, 200);
          await new Promise((r) => setTimeout(r, 30));
        }
        controls.autoRotate = true;
      }

      async function newScramble() {
        if (state.scrambling) return;
        state.scrambling = true;
        scrambleBtn.textContent = "Scrambling...";
        currentScramble = generateScramble(20);
        scrambleEl.textContent = currentScramble.join("  ");
        scrambleEl.style.animation = "none";
        void scrambleEl.offsetHeight;
        scrambleEl.style.animation = "fadeSlide 0.4s ease";
        await applyScramble(currentScramble);
        state.scrambling = false;
        scrambleBtn.textContent = "New Scramble";
      }

      // ─── Solve checking ───
      function isSolved() {
        return cubies.every((c) => {
          const h = c.userData.home;
          const p = c.position;
          return (
            Math.abs(p.x - h.x) < 0.3 &&
            Math.abs(p.y - h.y) < 0.3 &&
            Math.abs(p.z - h.z) < 0.3
          );
        });
      }

      // ─── Timer ───
      function formatTime(ms) {
        if (ms < 0) ms = 0;
        const totalSec = ms / 1000;
        const min = Math.floor(totalSec / 60);
        const sec = totalSec % 60;
        if (min > 0) return `${min}:${sec.toFixed(2).padStart(5, "0")}`;
        return sec.toFixed(2);
      }

      function updateTimerDisplay() {
        if (state.running) {
          state.elapsed = performance.now() - state.startTime;
          timerEl.textContent = formatTime(state.elapsed);
          state.animFrame = requestAnimationFrame(updateTimerDisplay);
        }
      }

      function startTimer() {
        state.running = true;
        state.phase = "running";
        state.startTime = performance.now();
        state.elapsed = 0;
        timerEl.className = "running";
        timerWrap.className = "running";
        infoEl.textContent = "Solving...";
        infoEl.classList.add("active");
        timerEl.textContent = "0.00";
        updateTimerDisplay();
      }

      function stopTimer() {
        if (!state.running) return;
        state.running = false;
        if (state.animFrame) cancelAnimationFrame(state.animFrame);
        state.phase = "stopped";
        const t = state.elapsed;
        times.push(t);
        timerEl.className = "stopped";
        timerWrap.className = "stopped";
        timerEl.style.animation = "pop 0.3s ease";
        infoEl.textContent = "Solve recorded";
        infoEl.classList.add("active");
        updateStats();
        if (isSolved()) {
          infoEl.textContent += " ✓ Solved!";
        }
        setTimeout(() => {
          if (state.phase === "stopped") {
            state.phase = "idle";
            timerEl.className = "";
            timerWrap.className = "";
            timerEl.style.animation = "";
            infoEl.textContent = "Hold spacebar — release to start";
            infoEl.classList.remove("active");
            newScramble();
          }
        }, 2000);
      }

      function resetTimer() {
        state.running = false;
        if (state.animFrame) cancelAnimationFrame(state.animFrame);
        state.phase = "idle";
        state.elapsed = 0;
        timerEl.textContent = "0.00";
        timerEl.className = "";
        timerWrap.className = "";
        timerEl.style.animation = "";
        infoEl.textContent = "Hold spacebar — release to start";
        infoEl.classList.remove("active");
      }

      // ─── Stats ───
      function avg(arr) {
        if (arr.length < 3) return null;
        const sorted = [...arr].sort((a, b) => a - b);
        const trimmed = sorted.slice(1, -1);
        return trimmed.reduce((s, v) => s + v, 0) / trimmed.length;
      }

      function avgN(n) {
        if (times.length < n) return null;
        const recent = times.slice(-n);
        return avg(recent);
      }

      function updateStats() {
        const ao5 = avgN(5);
        const ao12 = avgN(12);
        const best = times.length ? Math.min(...times) : null;
        const worst = times.length ? Math.max(...times) : null;
        ao5El.textContent = ao5 !== null ? formatTime(ao5) : "—";
        ao12El.textContent = ao12 !== null ? formatTime(ao12) : "—";
        bestEl.textContent = best !== null ? formatTime(best) : "—";
        worstEl.textContent = worst !== null ? formatTime(worst) : "—";
        solvesEl.textContent = times.length;
        renderTimes();
      }

      function renderTimes() {
        const best = times.length ? Math.min(...times) : null;
        const worst = times.length ? Math.max(...times) : null;
        timesEl.innerHTML = times
          .map((t, i) => {
            let cls = "time-tag";
            if (t === best && best !== worst) cls += " best";
            else if (t === worst && worst !== best) cls += " worst";
            return `<span class="${cls}">${formatTime(t)}</span>`;
          })
          .join("");
        timesEl.scrollTop = timesEl.scrollHeight;
        if (timesEl.scrollWidth > timesEl.clientWidth + 20) {
          timesEl.style.justifyContent = "flex-start";
        } else {
          timesEl.style.justifyContent = "center";
        }
      }

      // ─── Keyboard ───
      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" && !e.repeat && e.target === document.body) {
          e.preventDefault();
          if (state.scrambling) return;
          if (state.phase === "idle" || state.phase === "ready") {
            state.phase = "ready";
            timerEl.className = "ready";
            timerWrap.className = "ready";
            infoEl.textContent = "Release to start";
            infoEl.classList.add("active");
          }
        }
      });

      document.addEventListener("keyup", (e) => {
        if (e.code === "Space" && e.target === document.body) {
          e.preventDefault();
          if (state.phase === "ready") {
            startTimer();
          } else if (state.phase === "running") {
            stopTimer();
          }
        }
      });

      // ─── Touch support for timer ───
      let touchStartTime = 0;
      container.addEventListener("touchstart", (e) => {
        // Only handle if not interacting with 3D (allow orbit on cube)
      });

      document.addEventListener(
        "touchstart",
        (e) => {
          if (e.target === container || container.contains(e.target)) return;
          if (state.phase === "idle") {
            state.phase = "ready";
            timerEl.className = "ready";
            timerWrap.className = "ready";
            infoEl.textContent = "Release to start";
            infoEl.classList.add("active");
            touchStartTime = performance.now();
          }
        },
        { passive: true },
      );

      document.addEventListener(
        "touchend",
        (e) => {
          if (state.phase === "ready") {
            startTimer();
          } else if (state.phase === "running") {
            stopTimer();
            state.phase = "idle";
          }
        },
        { passive: true },
      );

      // ─── Buttons ───
      scrambleBtn.addEventListener("click", () => {
        if (state.running || state.scrambling) return;
        resetTimer();
        newScramble();
      });

      // ─── Resize ───
      function resize() {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
      window.addEventListener("resize", resize);
      new ResizeObserver(resize).observe(container);

      // ─── Render loop ───
      function render() {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }
      render();

      // ─── Init ───
      newScramble();
      resize();

      console.log("CubeTimer ready — hold SPACE to start");
    </script>
  </body>
</html>
